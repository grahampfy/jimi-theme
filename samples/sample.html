<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theme Preview</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --fg: #cdd6f4;
      --accent: #89b4fa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem;
    }

    h1 { color: var(--accent); font-size: 2rem; }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 1rem;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Theme Preview</h1>
    <div class="card" id="main-card">
      <p>This is a <strong>sample</strong> HTML file.</p>
      <a href="#section">Link example</a>
      <ul>
        <li data-index="0">Item one</li>
        <li data-index="1">Item two</li>
        <li data-index="2">Item three</li>
      </ul>
    </div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const card = document.getElementById("main-card");
      card.addEventListener("click", (e) => {
        console.log("clicked:", e.target.tagName);
      });
    });
  </script>
</body>
</html>
