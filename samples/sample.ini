; Sample INI / git-config style file for theme preview
; Section names below (core, remote, branch) exercise the section-name scope.

[core]
repositoryformatversion = 0
filemode = true
bare = false
logallrefupdates = true

[remote "origin"]
url = git@example.com:user/repo.git
fetch = +refs/heads/*:refs/remotes/origin/*

[branch "main"]
remote = origin
merge = refs/heads/main

[alias]
co = checkout
st = status
lg = log --oneline --graph

# Some grammars use '#' for comments too
[user]
name = Example User
email = user@example.com
